version: "1.0"

# Coffee Pocket — Semantic Layer v1.0
# 定義 LLM 如何理解一間咖啡廳的標準化標籤。
# 詳見 SPEC.md / AGENTS.md。

platform_tags:

  socket_available:
    display_name:
      zh: "有插座"
      en: "Socket Available"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_sources: 1
    source_mapping:
      cafe_nomad:
        direct_fields:
          socket:
            yes: true
            maybe: partial
            no: false
      google_reviews:
        positive_keywords:
          - "有插座"
          - "插座很多"
          - "每桌都有插座"
          - "可以充電"
          - "適合帶電腦"
        negative_keywords:
          - "沒有插座"
          - "插座很少"
      instagram_posts:
        positive_keywords:
          - "插座"
          - "帶電腦"
          - "工作"
          - "充電"
    llm_interpretation_rules:
      positive_conditions:
        - "mentions_socket"
        - "mentions_charging"
        - "mentions_laptop_usage"
      negative_conditions:
        - "mentions_no_socket"

  pet_friendly:
    display_name:
      zh: "寵物友善"
      en: "Pet Friendly"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_sources: 1
    source_mapping:
      google_reviews:
        positive_keywords:
          - "寵物友善"
          - "可以帶狗"
          - "可以帶寵物"
          - "歡迎毛小孩"
          - "店狗"
          - "店貓"
        negative_keywords:
          - "謝絕寵物"
          - "不能帶寵物"
          - "寵物不能入內"
      instagram_posts:
        positive_keywords:
          - "寵物友善"
          - "毛小孩"
          - "店狗"
          - "店貓"
    llm_interpretation_rules:
      positive_conditions:
        - "mentions_pets_allowed"
        - "mentions_resident_dog_or_cat"
      negative_conditions:
        - "mentions_pets_not_allowed"

  study_friendly:
    display_name:
      zh: "適合讀書辦公"
      en: "Study Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    confidence_rules:
      minimum_confidence: 0.75
    semantic_conditions:
      strong_positive:
        - "quiet_environment"
        - "large_table"
        - "socket_available"
        - "people_using_laptops"
        - "long_stay_possible"
      weak_positive:
        - "wifi_available"
        - "spacious_seating"
      negative:
        - "too_crowded"
        - "music_too_loud"
        - "time_limit_short"
        - "high_turnover"
    source_mapping:
      cafe_nomad:
        derived_logic:
          - condition:
              quiet: ">= 4"
              socket: "yes"
            score_bonus: 30
          - condition:
              limited_time: "no"
            score_bonus: 20
      google_reviews:
        positive_keywords:
          - "適合讀書"
          - "適合工作"
          - "很多人用電腦"
          - "安靜"
          - "桌子大"
        negative_keywords:
          - "很吵"
          - "不好久坐"
          - "限時"
          - "音樂太大聲"

  discussion_friendly:
    display_name:
      zh: "適合討論"
      en: "Discussion Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    description: >
      適合 2~3 人小組討論 / 開會 / 共同工作的環境（需要能講話但不一定要熱鬧）。
      與 group_chat_friendly 區別：這是「工作型討論」，後者是「社交型聊天」。
    semantic_conditions:
      strong_positive:
        - "conversation_allowed"
        - "moderate_noise"
        - "small_group_work_friendly"
        - "large_table"
      negative:
        - "too_quiet"
        - "study_focused_environment"
        - "strict_silence"
    source_mapping:
      cafe_nomad:
        derived_logic:
          - condition:
              quiet: "2~3"
            score_bonus: 20
      google_reviews:
        positive_keywords:
          - "適合討論"
          - "小組討論"
          - "開會"
          - "帶筆電討論"
          - "兩三人工作"
        negative_keywords:
          - "太安靜不敢講話"
          - "太吵聽不到"

  group_chat_friendly:
    display_name:
      zh: "適合多人聊天"
      en: "Group Chat Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    description: >
      適合 3 人以上社交聚會 / 純聊天（放鬆社交，氛圍熱鬧、可放心暢聊）。
      cafe_nomad 沒有直接欄位可以推導，主要由 Google reviews / Instagram 提供。
    semantic_conditions:
      strong_positive:
        - "group_gathering_friendly"
        - "large_table"
        - "lively_atmosphere"
        - "private_room_available"
      negative:
        - "too_small_for_groups"
        - "two_person_table_only"
        - "strict_silence"
    source_mapping:
      google_reviews:
        positive_keywords:
          - "適合多人"
          - "朋友聚會"
          - "聚餐"
          - "包場"
          - "大桌"
          - "一群人聊天"
          - "熱鬧暢聊"
          - "家庭聚會"
        negative_keywords:
          - "位置太小"
          - "不適合多人"
          - "僅限兩人桌"
          - "限一人一杯"
      instagram_posts:
        positive_keywords:
          - "聚會"
          - "包場"
          - "多人"
          - "聚餐"

  reservable:
    display_name:
      zh: "可訂位"
      en: "Reservable"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_sources: 1
    description: >
      店家是否可事先訂位 / 預約座位。cafe_nomad 沒有對應欄位，
      由 Google reviews / Instagram 抽取。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "可訂位"
          - "接受訂位"
          - "可預約"
          - "建議先訂位"
          - "打電話訂位"
          - "線上訂位"
        negative_keywords:
          - "不接受訂位"
          - "僅現場排隊"
          - "不可預約"
          - "採排隊制"
      instagram_posts:
        positive_keywords:
          - "訂位"
          - "預約"
    llm_interpretation_rules:
      positive_conditions:
        - "mentions_reservation_accepted"
        - "mentions_booking_recommended"
      negative_conditions:
        - "mentions_no_reservation"
        - "mentions_walk_in_only"

  outdoor_seating:
    display_name:
      zh: "戶外座"
      en: "Outdoor Seating"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_sources: 1
    description: >
      店家是否有戶外座位 / 室外區 / 露天座位。cafe_nomad 沒有對應欄位，
      由 Google reviews / Instagram 抽取。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "戶外座"
          - "戶外座位"
          - "露天"
          - "室外區"
          - "戶外區"
          - "室外座位"
        negative_keywords:
          - "沒有戶外座"
          - "僅限室內"
          - "無室外座位"
      instagram_posts:
        positive_keywords:
          - "戶外座"
          - "露天"
          - "室外區"
          - "戶外區"
    llm_interpretation_rules:
      positive_conditions:
        - "mentions_outdoor_seating"
        - "mentions_patio"
        - "mentions_terrace"
      negative_conditions:
        - "mentions_no_outdoor_seating"

  time_limit:
    display_name:
      zh: "限時規則"
      en: "Time Limit"
    type: structured
    schema:
      status:
        enum:
          - unlimited
          - conditional
          - limited
      duration_minutes:
        type: integer
        nullable: true
      conditions:
        type: string
        nullable: true
    source_mapping:
      cafe_nomad:
        direct_fields:
          limited_time:
            yes:
              status: limited
            maybe:
              status: conditional
            no:
              status: unlimited
      google_reviews:
        extraction_patterns:
          - "限時90分鐘"
          - "客滿限時兩小時"
          - "假日限時"
          - "不限時"
      instagram_posts:
        extraction_patterns:
          - "不限時"
          - "久坐"
          - "客滿限時"
    llm_extraction_rules:
      duration_detection:
        enabled: true
      normalize_rules:
        - input: "兩小時"
          output_minutes: 120
        - input: "90分鐘"
          output_minutes: 90

# ─────────────────────────────────────────────────────────────────────────────
# 輔助欄位（不是 platform_tags，但會出現在 raw signals 裡，供彙整使用）
auxiliary_signals:
  noise_level:
    description: >
      環境的「安靜程度」，1~5 整數。**5 = 非常安靜（鴉雀無聲），1 = 非常吵雜**。
      注意欄位名稱叫 noise_level，但語意是「quietness」——歷史遺留命名。
      Cafe Nomad 的 `quiet` 欄位直接映射到這個欄位。
      Google reviews / Instagram 的 LLM 抽取也應遵循同方向（高=安靜）。
    used_by:
      - study_friendly       # >=4 → 加分
      - discussion_friendly  # <=3 → 加分
  wifi_quality:
    description: "Wi-Fi 品質, 1~5 整數, 5 = 最好。"
  seating_availability:
    description: "座位充足度, 1~5 整數, 5 = 最充足。"

# 共通輔助欄位（每個標籤實例都應附帶）
evidence_schema:
  evidence:
    - source: google_review | cafe_nomad | instagram | community
      text: string
      confidence: float  # 0.0 – 1.0
      review_id: uuid    # nullable
  confidence_score: float
  last_verified_at: date

# 來源優先順序（衝突仲裁）
source_priority:
  - community
  - google_reviews_recent
  - instagram
  - cafe_nomad
