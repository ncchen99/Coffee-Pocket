version: "2.0"

# Coffee Pocket — Semantic Layer v2.0
# 定義 LLM 如何理解一間咖啡廳的標準化標籤。
# 詳見 SPEC.md / AGENTS.md。
#
# v2.0 重點變動（取代 v1.0）：
#   - socket_available → 拆 socket_most / socket_few
#   - pet_friendly     → 拆 has_resident_cat / has_resident_dog
#   - 新增 large_table_most / large_table_few
#   - 新增 wifi_available, high_cp_value
#   - 新增 scooter_parking_easy / car_parking_easy
#   - time_limit 移除 duration_minutes，只保留 status
#   - group_chat_friendly 收緊判斷規則（必須明確 4 人以上 / 大桌容量）

platform_tags:

  # ---------- 插座（覆蓋率） ----------
  socket_most:
    display_name:
      zh: "多數座位有插座"
      en: "Sockets at most seats"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    description: >
      多數座位附近有插座可使用（每桌都有 / 大部分桌子有 / 整面牆都是插座）。
      與 socket_few 互斥；當 socket_most 成立時 socket_few 不再產生。
    source_mapping:
      cafe_nomad:
        direct_fields:
          socket:
            yes: true
      google_reviews:
        positive_keywords:
          - "每桌都有插座"
          - "每張桌子都有插座"
          - "插座很多"
          - "整面牆都是插座"
          - "幾乎每桌都有"
        negative_keywords:
          - "沒有插座"
          - "插座很少"

  socket_few:
    display_name:
      zh: "少數座位有插座"
      en: "Sockets at few seats"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    description: >
      只有少部分座位有插座（牆邊 / 角落 / 吧台才有）。
    source_mapping:
      cafe_nomad:
        direct_fields:
          socket:
            maybe: true
      google_reviews:
        positive_keywords:
          - "靠牆才有插座"
          - "角落才有插座"
          - "插座位置有限"
          - "只有少數座位有插座"

  # ---------- 桌子大小 ----------
  large_table_most:
    display_name:
      zh: "多數是大桌"
      en: "Mostly large tables"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    description: >
      多數座位都是適合 4 人以上使用的大桌。需要評論明確提到「大桌」、
      「桌子很大」、「桌面寬」、「四人桌很多」等具體描述。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "桌子大"
          - "桌面寬"
          - "大桌很多"
          - "都是大桌"
          - "四人桌"
          - "六人桌"

  large_table_few:
    display_name:
      zh: "偶有大桌"
      en: "A few large tables"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    description: >
      只有少數大桌（多數是雙人桌 / 小圓桌）。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "只有一兩張大桌"
          - "大桌不多"
          - "多數是兩人桌"

  # ---------- Wi-Fi ----------
  wifi_available:
    display_name:
      zh: "有 Wi-Fi"
      en: "Wi-Fi Available"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    description: >
      店家有提供可使用的 Wi-Fi。評論需明確提到 Wi-Fi 才成立。
    source_mapping:
      cafe_nomad:
        direct_fields:
          wifi:
            yes: true
      google_reviews:
        positive_keywords:
          - "有 Wi-Fi"
          - "有wifi"
          - "提供無線網路"
          - "Wi-Fi 很快"
        negative_keywords:
          - "沒有 Wi-Fi"
          - "沒有無線網路"

  # ---------- CP 值 ----------
  high_cp_value:
    display_name:
      zh: "高 CP 值"
      en: "High Value"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      # 採用「正向佔比 >= 0.6」聚合（aggregate_cp_value），不單純多數決
      positive_ratio: 0.6
    description: >
      多數使用者覺得物超所值。聚合邏輯：positive / (positive + negative)
      >= positive_ratio 才視為 True；一半一半則 False。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "便宜"
          - "高 CP 值"
          - "CP 值高"
          - "份量大"
          - "划算"
          - "物超所值"
        negative_keywords:
          - "貴"
          - "不划算"
          - "CP 值不高"
          - "價格偏高"
          - "份量太少"

  # ---------- 停車 ----------
  scooter_parking_easy:
    display_name:
      zh: "機車好停"
      en: "Scooter parking easy"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    source_mapping:
      google_reviews:
        positive_keywords:
          - "機車好停"
          - "機車位多"
          - "機車格很多"
        negative_keywords:
          - "機車不好停"
          - "沒地方停機車"

  car_parking_easy:
    display_name:
      zh: "汽車好停"
      en: "Car parking easy"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.15
    source_mapping:
      google_reviews:
        positive_keywords:
          - "停車方便"
          - "有停車場"
          - "汽車好停"
          - "附設停車"
        negative_keywords:
          - "不好停車"
          - "停車困難"
          - "沒地方停車"

  # ---------- 寵物 / 店寵 ----------
  has_resident_cat:
    display_name:
      zh: "有店貓"
      en: "Resident cat"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.10
    description: >
      店內有駐店貓（店貓 / 老闆養的貓）。注意：
      「可以帶寵物」、「歡迎毛小孩」**不算**店貓——只記錄駐店動物。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "店貓"
          - "駐店貓"
          - "老闆養的貓"
          - "有貓"

  has_resident_dog:
    display_name:
      zh: "有店狗"
      en: "Resident dog"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 2
      minimum_evidence_ratio: 0.10
    description: >
      店內有駐店狗（店狗 / 老闆養的狗）。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "店狗"
          - "駐店狗"
          - "老闆養的狗"
          - "有狗"

  # ---------- 既有 score / 其他 boolean ----------
  study_friendly:
    display_name:
      zh: "適合讀書辦公"
      en: "Study Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    confidence_rules:
      minimum_confidence: 0.75
    semantic_conditions:
      strong_positive:
        - "quiet_environment"
        - "large_table"
        - "socket_available"
        - "people_using_laptops"
        - "long_stay_possible"
      weak_positive:
        - "wifi_available"
        - "spacious_seating"
      negative:
        - "too_crowded"
        - "music_too_loud"
        - "time_limit_short"
        - "high_turnover"
    source_mapping:
      cafe_nomad:
        derived_logic:
          - condition:
              quiet: ">= 4"
              socket: "yes"
            score_bonus: 30
          - condition:
              limited_time: "no"
            score_bonus: 20
      google_reviews:
        positive_keywords:
          - "適合讀書"
          - "適合工作"
          - "很多人用電腦"
          - "安靜"
          - "桌子大"
        negative_keywords:
          - "很吵"
          - "不好久坐"
          - "限時"
          - "音樂太大聲"

  discussion_friendly:
    display_name:
      zh: "適合討論"
      en: "Discussion Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    description: >
      適合 2~3 人小組討論 / 開會 / 共同工作的環境（需要能講話但不一定要熱鬧）。
      與 group_chat_friendly 區別：這是「工作型討論」，後者是「社交型聊天」。
    semantic_conditions:
      strong_positive:
        - "conversation_allowed"
        - "moderate_noise"
        - "small_group_work_friendly"
        - "large_table"
      negative:
        - "too_quiet"
        - "study_focused_environment"
        - "strict_silence"
    source_mapping:
      cafe_nomad:
        derived_logic:
          - condition:
              quiet: "2~3"
            score_bonus: 20
      google_reviews:
        positive_keywords:
          - "適合討論"
          - "小組討論"
          - "開會"
          - "帶筆電討論"
          - "兩三人工作"
        negative_keywords:
          - "太安靜不敢講話"
          - "太吵聽不到"

  group_chat_friendly:
    display_name:
      zh: "適合多人聊天"
      en: "Group Chat Friendly"
    type: score
    score_range:
      min: 0
      max: 100
    description: >
      適合 **4 人以上** 社交聚會 / 純聊天。判定規則嚴格：必須明確提到
      「四人」、「五人」、「一群人」、「家庭聚會」、「包場」、「大桌可坐多人」
      等具體用詞或數字。**「適合朋友聊天」、「適合與朋友來」這類泛指不成立。**
      原因：許多咖啡廳雖然能聊天，但沒有 4 人桌或不收 4 人以上群體。
    semantic_conditions:
      strong_positive:
        - "group_gathering_4plus"
        - "large_table"
        - "lively_atmosphere"
        - "private_room_available"
      negative:
        - "too_small_for_groups"
        - "two_person_table_only"
        - "strict_silence"
    source_mapping:
      google_reviews:
        positive_keywords:
          - "適合多人"
          - "四人"
          - "五人"
          - "一群人"
          - "家庭聚會"
          - "包場"
          - "大桌可坐多人"
        negative_keywords:
          - "位置太小"
          - "不適合多人"
          - "僅限兩人桌"
          - "限一人一杯"
      instagram_posts:
        positive_keywords:
          - "聚會"
          - "包場"
          - "家庭聚餐"

  reservable:
    display_name:
      zh: "可訂位"
      en: "Reservable"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 1
    description: >
      店家是否可事先訂位 / 預約座位。cafe_nomad 沒有對應欄位，
      由 Google reviews / Instagram 抽取。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "可訂位"
          - "接受訂位"
          - "可預約"
          - "建議先訂位"
          - "打電話訂位"
          - "線上訂位"
        negative_keywords:
          - "不接受訂位"
          - "僅現場排隊"
          - "不可預約"
          - "採排隊制"
      instagram_posts:
        positive_keywords:
          - "訂位"
          - "預約"

  outdoor_seating:
    display_name:
      zh: "戶外座"
      en: "Outdoor Seating"
    type: boolean
    confidence_rules:
      minimum_confidence: 0.7
      minimum_evidence: 1
    description: >
      店家是否有戶外座位 / 室外區 / 露天座位。cafe_nomad 沒有對應欄位，
      由 Google reviews / Instagram 抽取。
    source_mapping:
      google_reviews:
        positive_keywords:
          - "戶外座"
          - "露天"
          - "室外區"
          - "戶外區"
        negative_keywords:
          - "沒有戶外座"
          - "僅限室內"

  time_limit:
    display_name:
      zh: "限時規則"
      en: "Time Limit"
    type: structured
    schema:
      status:
        enum:
          - unlimited      # 不限時
          - limited        # 一律限時
          - conditional    # 只在客滿時限時
    description: >
      v2.0 起不再記錄 duration_minutes，只保留 status 三選一。
    source_mapping:
      cafe_nomad:
        direct_fields:
          limited_time:
            yes:
              status: limited
            maybe:
              status: conditional
            no:
              status: unlimited
      google_reviews:
        extraction_patterns:
          - "限時"
          - "客滿限時"
          - "假日限時"
          - "不限時"

# ─────────────────────────────────────────────────────────────────────────────
# Deprecated（v1.0 → v2.0）。資料庫舊資料保留，但 pipeline 不再寫入這些 tag_key。
deprecated_tags:
  - socket_available     # → socket_most / socket_few
  - pet_friendly         # → has_resident_cat / has_resident_dog

# ─────────────────────────────────────────────────────────────────────────────
# 輔助欄位（不是 platform_tags，但會出現在 raw signals 裡，供彙整使用）
auxiliary_signals:
  noise_level:
    description: >
      環境的「安靜程度」，1~5 整數。**5 = 非常安靜（鴉雀無聲），1 = 非常吵雜**。
      注意欄位名稱叫 noise_level，但語意是「quietness」——歷史遺留命名。
      Cafe Nomad 的 `quiet` 欄位直接映射到這個欄位。
      Google reviews / Instagram 的 LLM 抽取也應遵循同方向（高=安靜）。
    used_by:
      - study_friendly       # >=4 → 加分
      - discussion_friendly  # <=3 → 加分
  seating_availability:
    description: "座位充足度, 1~5 整數, 5 = 最充足。"

# 共通輔助欄位（每個標籤實例都應附帶）
evidence_schema:
  evidence:
    - source: google_review | cafe_nomad | instagram | community
      text: string
      confidence: float  # 0.0 – 1.0
      review_id: uuid    # nullable
  confidence_score: float
  last_verified_at: date

# 來源優先順序（衝突仲裁）
source_priority:
  - community
  - google_reviews_recent
  - instagram
  - cafe_nomad

# Pipeline 全域聚合預設（若 tag 未個別指定 confidence_rules）
aggregation_defaults:
  boolean:
    minimum_evidence: 2
    minimum_evidence_ratio: 0.15   # positives / max(total_reviews_for_cafe, pos+neg)
    minimum_confidence: 0.7
  community_override: true         # community 來源不受門檻限制
